<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-label="AWS CloudFormation Infrastructure as Code project">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset=".55" stop-color="#0b1f3a"/>
      <stop offset="1" stop-color="#160b2f"/>
    </linearGradient>
    <radialGradient id="glow1" cx=".2" cy=".15" r=".7">
      <stop offset="0" stop-color="#ff9900" stop-opacity=".34"/>
      <stop offset="1" stop-color="#ff9900" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx=".85" cy=".8" r=".65">
      <stop offset="0" stop-color="#7c3aed" stop-opacity=".40"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-opacity=".36"/>
    </filter>
  </defs>

  <rect width="1600" height="520" rx="34" fill="url(#bg)"/>
  <rect width="1600" height="520" rx="34" fill="url(#glow1)"/>
  <rect width="1600" height="520" rx="34" fill="url(#glow2)"/>

  <g transform="translate(92 82)">
    <text x="0" y="0" dominant-baseline="hanging" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="800" letter-spacing="5" fill="#ff9900">INFRASTRUCTURE AS CODE</text>
    <text x="0" y="68" dominant-baseline="hanging" font-family="Arial,Helvetica,sans-serif" font-size="78" font-weight="800" fill="#f8fafc">AWS CloudFormation</text>
    <text x="0" y="160" dominant-baseline="hanging" font-family="Arial,Helvetica,sans-serif" font-size="42" font-weight="700" fill="#dbeafe">VPC · IAM · EC2 · Nginx</text>
    <text x="0" y="236" dominant-baseline="hanging" font-family="Arial,Helvetica,sans-serif" font-size="26" fill="#aebfd6">Reusable YAML template. Secure administration. Verified deployment. Complete cleanup.</text>

    <g transform="translate(0 332)" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="700">
      <rect width="250" height="58" rx="29" fill="#ffffff" fill-opacity=".08" stroke="#ffffff" stroke-opacity=".17"/>
      <text x="125" y="36" text-anchor="middle" fill="#f8fafc">11 AWS Resources</text>

      <rect x="270" width="230" height="58" rx="29" fill="#ffffff" fill-opacity=".08" stroke="#ffffff" stroke-opacity=".17"/>
      <text x="385" y="36" text-anchor="middle" fill="#f8fafc">CREATE_COMPLETE</text>

      <rect x="520" width="220" height="58" rx="29" fill="#ffffff" fill-opacity=".08" stroke="#ffffff" stroke-opacity=".17"/>
      <text x="630" y="36" text-anchor="middle" fill="#f8fafc">HTTP 200 OK</text>

      <rect x="760" width="220" height="58" rx="29" fill="#ffffff" fill-opacity=".08" stroke="#ffffff" stroke-opacity=".17"/>
      <text x="870" y="36" text-anchor="middle" fill="#f8fafc">DELETE_COMPLETE</text>
    </g>
  </g>

  <g transform="translate(1230 120)" filter="url(#shadow)">
    <path d="M150 0 280 75v150L150 300 20 225V75Z" fill="#ff9900" fill-opacity=".14" stroke="#ff9900" stroke-width="4"/>
    <path d="M150 54 234 103v94l-84 49-84-49v-94Z" fill="#7c3aed" fill-opacity=".42" stroke="#c4b5fd" stroke-width="3"/>
    <text x="150" y="165" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="44" font-weight="800" fill="#ffffff">CFN</text>
  </g>
</svg>